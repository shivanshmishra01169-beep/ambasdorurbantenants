<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CampusCrew{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f8fc;
            --surface: #ffffff;
            --surface2: #eef3fa;
            --border: #dde6f0;
            --text: #0b2545;
            --text-muted: #5d7290;
            --navy: #0b2545;
            --navy2: #13315c;
            --tech: #1d4ed8;
            --tech-glow: rgba(29,78,216,0.10);
            --mkt: #ea8c00;
            --mkt-glow: rgba(234,140,0,0.10);
            --acc: #0d9488;
            --acc-glow: rgba(13,148,136,0.10);
            --gold: #f5a623;
            --radius: 12px;
            --sans: 'DM Sans', sans-serif;
            --head: 'Sora', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        h1, h2, h3, .nav-logo, .btn { font-family: var(--head); }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--navy);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-logo span { color: var(--tech); }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text); }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.6rem 1.4rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--navy); color: #fff; }
        .btn-primary:hover { background: var(--navy2); transform: translateY(-1px); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
        .btn-danger { background: #dc2626; color: #fff; }
        .messages-container {
            max-width: 600px;
            margin: 1rem auto;
            padding: 0 1rem;
        }
        .msg {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .msg.success { background: rgba(13,148,136,0.10); border: 1px solid var(--acc); color: #0d9488; }
        .msg.error { background: rgba(220,38,38,0.08); border: 1px solid #dc2626; color: #b91c1c; }
        .msg.warning { background: rgba(234,140,0,0.10); border: 1px solid var(--mkt); color: #b45309; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-logo">🎓 Campus<span>Crew</span></a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'logout' %}" class="btn btn-ghost" style="padding:0.4rem 1rem;">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn btn-primary" style="padding:0.4rem 1rem;">Register</a>
            {% endif %}
        </div>
    </nav>
    {% if messages %}
    <div class="messages-container">
        {% for message in messages %}
        <div class="msg {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
