{% extends 'base.html' %}
{% block title %}Login — CampusCrew{% endblock %}
{% block extra_css %}
<style>
.auth-wrap {
    min-height: calc(100vh - 65px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: radial-gradient(ellipse at 30% 50%, rgba(37,99,235,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 20%, rgba(13,148,136,0.05) 0%, transparent 50%);
}
.auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(15,39,66,0.05);
}
.auth-header { text-align: center; margin-bottom: 2rem; }
.auth-header h1 { font-size: 1.8rem; font-weight: 700; }
.auth-header p { color: var(--text-muted); margin-top: 0.4rem; font-size: 0.95rem; }
.field { margin-bottom: 1.2rem; }
.field label {
    display: block; font-size: 0.82rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 0.4rem;
    text-transform: uppercase; letter-spacing: 0.05em;
}
.field input, .field select, .field textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 0.75rem 1rem; color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem;
    transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--tech);
    box-shadow: 0 0 0 3px var(--tech-glow);
}
.auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
.auth-footer a { color: var(--tech); text-decoration: none; }
.btn-full { width: 100%; justify-content: center; padding: 0.85rem; font-size: 1rem; }
.brand-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--tech-glow); border: 1px solid rgba(37,99,235,0.25);
    border-radius: 100px; padding: 0.3rem 0.8rem;
    font-size: 0.8rem; color: var(--tech); margin-bottom: 1rem;
    font-family: var(--mono);
}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand-badge">🎓 campuscrew.in</div>
            <h1>Welcome back</h1>
            <p>Log in to see your crew dashboard</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="your_username" autofocus>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login →</button>
        </form>
        <div class="auth-footer">
            New here? <a href="{% url 'register' %}">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
